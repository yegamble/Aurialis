name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test -- --coverage
      - run: pnpm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    # Override env vars at build time so E2E runs against a production bundle
    # that points at localhost:8000 (no live backend in CI) AND exposes the
    # `window.__aurialisAudioStore` hook used by the toggle-audit suite.
    # `.env.production` (committed) points at the live CF URL — that's correct
    # for real deploys but causes E2E to think the backend is reachable.
    env:
      NEXT_PUBLIC_SEPARATION_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEEP_ANALYSIS_API_URL: http://localhost:8000
      NEXT_PUBLIC_E2E_HOOKS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm run build
      - run: pnpm run test:generate-signals
      - run: pnpm run test:e2e
