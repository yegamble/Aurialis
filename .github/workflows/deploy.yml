name: Deploy

# Fires after CI succeeds on main. Inspects the merge commit's path diff and
# deploys only the side(s) that changed: backend (Cloudflare Container) or
# frontend (Cloudflare Worker via OpenNext). Each side is independent — a
# backend-only push never rebuilds/uploads the frontend, and vice versa.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Serialize deploys per branch — a second push while one is in flight queues
# behind it rather than racing. cancel-in-progress=false because cancelling
# mid-deploy can leave Cloudflare in an inconsistent state.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    # Skip everything if upstream CI failed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run runs on the default branch — check out the SHA that
          # triggered CI plus enough history to diff against its parent.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Compute changed paths
        id: filter
        run: |
          set -euo pipefail
          BASE=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          HEAD=$(git rev-parse HEAD)
          if [ -z "$BASE" ]; then
            # No parent (initial commit) — deploy everything.
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; printf '%s\n' "$CHANGED"

          if printf '%s\n' "$CHANGED" | grep -qE '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          # Frontend = anything not in backend/, docs/, .github/, or pure docs.
          if printf '%s\n' "$CHANGED" | grep -vE '^(backend/|docs/|\.github/|.*\.md$|\.gitignore$|\.python-version$)' | grep -q .; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    name: Deploy backend (Cloudflare Container)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Deploy via wrangler
        run: pnpm run deploy
        env:
          # Token needs Account → Workers Scripts (Edit) + Cloudflare
          # Containers (Edit). Verify with `wrangler whoami` if pushes 401.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke-production:
    name: Production smoke (read-only Newman)
    needs: deploy-backend
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wait for Cloudflare propagation
        run: sleep 30
      - name: Run Production Smoke folder
        run: pnpm run test:backend:postman:smoke

  deploy-frontend:
    name: Deploy frontend (OpenNext + Cloudflare Workers)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build + deploy via OpenNext
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
